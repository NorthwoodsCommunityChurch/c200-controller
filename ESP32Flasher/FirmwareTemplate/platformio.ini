; PlatformIO Project Configuration for Canon C200 Camera Controller
; ESP32-S3 with W5500 Ethernet

[env:esp32-s3]
platform = espressif32
board = esp32-s3-devkitc-1
framework = espidf

; ESP-IDF specific settings
board_build.flash_mode = dio
board_build.f_flash = 80000000L
board_build.partitions = default.csv

; Monitor settings
monitor_speed = 115200
monitor_filters = esp32_exception_decoder

; Build flags
build_flags =
    -DCONFIG_IDF_TARGET_ESP32S3=1
    -DCONFIG_SPIRAM=1
    -DCONFIG_ETH_ENABLED=1
    -DCONFIG_ETH_USE_SPI_ETHERNET=1
    -DCONFIG_ETH_SPI_ETHERNET_W5500=1

; Upload settings
upload_speed = 921600
upload_port = /dev/cu.usbmodem2101
