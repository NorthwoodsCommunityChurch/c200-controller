<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Lens ring gradient -->
    <linearGradient id="lensRing" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#555555"/>
      <stop offset="50%" style="stop-color:#2a2a2a"/>
      <stop offset="100%" style="stop-color:#444444"/>
    </linearGradient>
    
    <!-- RGB histogram gradients -->
    <linearGradient id="redChannel" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#ef4444;stop-opacity:0.05"/>
      <stop offset="100%" style="stop-color:#ef4444;stop-opacity:0.9"/>
    </linearGradient>
    <linearGradient id="greenChannel" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:0.05"/>
      <stop offset="100%" style="stop-color:#22c55e;stop-opacity:0.9"/>
    </linearGradient>
    <linearGradient id="blueChannel" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.05"/>
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:0.9"/>
    </linearGradient>
    
    <!-- Lens glass gradient -->
    <radialGradient id="lensGlass" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#15151f"/>
      <stop offset="80%" style="stop-color:#0a0a12"/>
      <stop offset="100%" style="stop-color:#050508"/>
    </radialGradient>
    
    <!-- Clip path for lens interior -->
    <clipPath id="lensClip">
      <circle cx="512" cy="544" r="288"/>
    </clipPath>
    
    <!-- Tally glow filter -->
    <filter id="tallyGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1024" height="1024" rx="228" fill="#171717"/>
  
  <!-- Subtle background gradient -->
  <rect width="1024" height="1024" rx="228" fill="url(#bgGrad)" opacity="0.5"/>
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#252525"/>
      <stop offset="100%" style="stop-color:#0d0d0d"/>
    </linearGradient>
  </defs>
  
  <!-- Tally light bar -->
  <rect x="400" y="96" width="224" height="56" rx="28" fill="#ef4444" filter="url(#tallyGlow)"/>
  
  <!-- Outer lens ring -->
  <circle cx="512" cy="544" r="352" fill="url(#lensRing)"/>
  
  <!-- Inner lens rings for depth -->
  <circle cx="512" cy="544" r="336" fill="#1a1a1a"/>
  <circle cx="512" cy="544" r="304" fill="#222222"/>
  
  <!-- Lens glass -->
  <circle cx="512" cy="544" r="288" fill="url(#lensGlass)"/>
  
  <!-- RGB histogram curves -->
  <g clip-path="url(#lensClip)">
    <!-- Red channel -->
    <path d="M224 800 
             Q304 784 368 656 
             Q448 416 528 496 
             Q608 576 688 384 
             Q768 544 800 656 
             L800 800 Z" 
          fill="url(#redChannel)"/>
    
    <!-- Green channel -->
    <path d="M224 800 
             Q288 720 384 544 
             Q464 304 544 416 
             Q624 528 704 368 
             Q768 464 800 576 
             L800 800 Z" 
          fill="url(#greenChannel)"/>
    
    <!-- Blue channel -->
    <path d="M224 800 
             Q336 624 416 496 
             Q496 336 576 304 
             Q656 336 736 464 
             Q784 592 800 720 
             L800 800 Z" 
          fill="url(#blueChannel)"/>
  </g>
  
  <!-- Lens reflection highlight -->
  <ellipse cx="384" cy="416" rx="112" ry="56" fill="#ffffff" opacity="0.06" transform="rotate(-30 384 416)"/>
  
  <!-- Secondary subtle reflection -->
  <ellipse cx="620" cy="660" rx="60" ry="30" fill="#ffffff" opacity="0.03" transform="rotate(-30 620 660)"/>
</svg>
